version: "3.9"

# Sage Forge — Keycloak Identity Provider
# Run: docker compose -f docker-compose.keycloak.yml up -d
#
# After starting, visit http://localhost:8080 and:
#   1. Sign in with admin / admin
#   2. Create a realm called "sage-forge"
#   3. Create a client:
#        Client ID:        sage-forge-app
#        Client Protocol: openid-connect
#        Access Type:     confidential
#        Valid Redirect URIs: http://localhost:3000/api/auth/callback/keycloak
#                             https://YOUR_DOMAIN/api/auth/callback/keycloak
#   4. Copy the client secret from the Credentials tab
#   5. Set these env vars in your .env.local:
#        AUTH_KEYCLOAK_ID=sage-forge-app
#        AUTH_KEYCLOAK_SECRET=<copied secret>
#        AUTH_KEYCLOAK_ISSUER=http://localhost:8080/realms/sage-forge
#        AUTH_SECRET=<run: openssl rand -base64 32>

services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy

volumes:
  keycloak_db_data:
