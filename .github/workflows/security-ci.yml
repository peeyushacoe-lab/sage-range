name: Security CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit-and-lint:
    name: Dependency Audit + Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency security audit
        # Fail on high/critical vulnerabilities; moderate are reported but don't block
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: audit-and-lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          # Provide dummy values so the build doesn't fail on missing env vars
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/sage_test"
          NEXTAUTH_SECRET: "ci-dummy-secret-not-used-in-production"
          NEXTAUTH_URL: "http://localhost:3000"
